# Single-origin dev reverse proxy (docs/RUNBOOK.md, resolves review A4).
# The browser sees one origin (http://localhost:8080); cookies stay SameSite=Lax.
#   /        -> web  (Vite dev server, with HMR websocket upgrade)
#   /api/    -> api  (NestJS; the /api prefix is stripped)
#   /hls/    -> edge (Go delivery edge; prefix preserved)

worker_processes 1;
events { worker_connections 1024; }

http {
  # Allow websocket upgrade (Vite HMR) to pass through.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream api  { server api:3000; }
  upstream edge { server edge:8081; }
  upstream web  { server web:5173; }

  server {
    listen 8080;
    server_name localhost;

    # Proxy's own liveness (used by the compose healthcheck).
    location = /healthz {
      add_header Content-Type text/plain;
      return 200 "proxy ok\n";
    }

    # API — strip the /api prefix so /api/healthz -> api:3000/healthz.
    location /api/ {
      proxy_pass http://api/;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS delivery — preserve the /hls/ prefix (edge routes on it).
    location /hls/ {
      proxy_pass http://edge;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA + Vite HMR websocket.
    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }
}
