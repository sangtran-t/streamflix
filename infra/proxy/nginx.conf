# Single-origin dev reverse proxy (docs/RUNBOOK.md, resolves review A4).
# The browser sees one origin (http://localhost:8080); cookies stay SameSite=Lax.
#   /        -> web  (Vite dev server, with HMR websocket upgrade)
#   /api/    -> api  (NestJS; the /api prefix is stripped)
#   /hls/    -> edge (Go delivery edge; prefix preserved)
#
# NOTE: upstreams use variables + Docker's embedded DNS resolver (127.0.0.11)
# so nginx re-resolves hostnames on each request. This prevents 502s when
# containers are recreated and their IPs change. When proxy_pass uses a
# variable, nginx does NOT auto-strip the location prefix, so we use an
# explicit rewrite for /api/ and /hls/.

worker_processes 1;
events { worker_connections 1024; }

http {
  # Docker's embedded DNS — resolves service names dynamically.
  resolver 127.0.0.11 valid=5s ipv6=off;

  # Allow websocket upgrade (Vite HMR) to pass through.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  server {
    listen 8080;
    server_name localhost;

    # Proxy's own liveness (used by the compose healthcheck).
    location = /healthz {
      add_header Content-Type text/plain;
      return 200 "proxy ok\n";
    }

    # API — strip /api prefix: /api/v1/auth/login -> api:3000/v1/auth/login
    location /api/ {
      set $upstream_api http://api:3000;
      rewrite ^/api/(.*) /$1 break;
      proxy_pass $upstream_api;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS delivery — preserve the /hls/ prefix (edge routes on it).
    location /hls/ {
      set $upstream_edge http://edge:8081;
      rewrite ^(.*) $1 break;
      proxy_pass $upstream_edge;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA + Vite HMR websocket.
    location / {
      set $upstream_web http://web:5173;
      proxy_pass $upstream_web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }
}
