name: streamflix

# ── Temporal version pins (update here to upgrade) ────────────────────────────
# Server + admin-tools must stay in sync (same minor version).
# UI has its own release cadence.
x-temporal-server-image: &temporal-server-image temporalio/server:1.31.1
x-temporal-admintools-image: &temporal-admintools-image temporalio/admin-tools:1.31.1
x-temporal-ui-image: &temporal-ui-image temporalio/ui:2.51.0

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9000/minio/health/live || exit 1']
      interval: 5s
      timeout: 5s
      retries: 12

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      echo 'minio bucket ready: '$${S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    restart: 'no'

  # ── Temporal (production-grade: explicit schema migration + server) ──────────
  #
  # Pattern (replaces the deprecated temporalio/auto-setup convenience image):
  #   1. temporal-db-setup  — runs temporal-sql-tool schema migrations, then exits.
  #   2. temporal           — starts the server (temporalio/server; distroless image,
  #                           no bundled setup scripts, no shell).
  #   3. temporal-namespace-setup — waits for the server to accept gRPC connections,
  #                           creates the "default" namespace, then exits.
  #   4. worker / api depend on temporal-namespace-setup completing so they start
  #                           only once Temporal is fully operational.
  #
  # To upgrade Temporal: bump x-temporal-*-image at the top of this file.

  temporal-db-setup:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -eu

        echo "==> Creating Temporal databases (idempotent)..."
        psql -h postgres -U "$$POSTGRES_USER" -d postgres \
          -c "SELECT 1 FROM pg_database WHERE datname='temporal'" | grep -q 1 \
          || psql -h postgres -U "$$POSTGRES_USER" -d postgres \
             -c "CREATE DATABASE temporal OWNER $$POSTGRES_USER;"
        echo "  'temporal' ready"

        psql -h postgres -U "$$POSTGRES_USER" -d postgres \
          -c "SELECT 1 FROM pg_database WHERE datname='temporal_visibility'" | grep -q 1 \
          || psql -h postgres -U "$$POSTGRES_USER" -d postgres \
             -c "CREATE DATABASE temporal_visibility OWNER $$POSTGRES_USER;"
        echo "  'temporal_visibility' ready"

        echo "==> Temporal database creation complete."
    restart: 'no'

  temporal-schema-setup:
    image: temporalio/admin-tools:1.31.1
    depends_on:
      temporal-db-setup:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        set -eu

        run_sql() {
          temporal-sql-tool \
            --plugin postgres12 \
            --endpoint postgres \
            --port 5432 \
            --user "$$POSTGRES_USER" \
            --password "$$POSTGRES_PASSWORD" \
            "$$@"
        }

        echo "==> Applying Temporal schema migrations..."
        run_sql --database temporal setup-schema -v 0.0 || echo "  schema already initialised"
        run_sql --database temporal \
          update-schema \
          --schema-dir /etc/temporal/schema/postgresql/v12/temporal/versioned

        echo "==> Applying Temporal visibility schema migrations..."
        run_sql --database temporal_visibility setup-schema -v 0.0 || echo "  visibility schema already initialised"
        run_sql --database temporal_visibility \
          update-schema \
          --schema-dir /etc/temporal/schema/postgresql/v12/visibility/versioned

        echo "==> Temporal schema setup complete."
    restart: 'no'

  temporal:
    image: *temporal-server-image
    depends_on:
      temporal-schema-setup:
        condition: service_completed_successfully
    environment:
      # Persistence — postgres12 = Postgres 12 + (our project's existing instance).
      DB: postgres12
      DB_PORT: '5432'
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      # Dynamic config file (relative to /etc/temporal/).
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      LOG_LEVEL: info
      # Expose gRPC on all interfaces inside the container.
      BIND_ON_IP: '0.0.0.0'
    volumes:
      - ./infra/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    ports:
      - '7233:7233'
    # NOTE: temporalio/server:1.31.x uses a distroless base image — there is no
    # shell or nc/wget inside the container, so CMD-SHELL health checks are not
    # possible. temporal-namespace-setup below acts as the readiness gate:
    # it loops until the server responds to gRPC health queries and only then
    # exits successfully, unblocking worker and api.
    restart: unless-stopped

  temporal-namespace-setup:
    image: *temporal-admintools-image
    depends_on:
      temporal:
        condition: service_started
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    entrypoint: ['/bin/sh', '-euc']
    command:
      - |
        echo "==> Waiting for Temporal server to accept connections..."
        MAX_WAIT=180
        ELAPSED=0
        until temporal operator cluster health --address temporal:7233 2>&1 | grep -q SERVING; do
          if [ "$$ELAPSED" -ge "$$MAX_WAIT" ]; then
            echo "ERROR: Temporal did not become ready within $${MAX_WAIT}s — aborting."
            exit 1
          fi
          echo "  not ready yet, retrying in 3s ($$ELAPSED/$${MAX_WAIT}s elapsed)..."
          sleep 3
          ELAPSED=$$((ELAPSED + 3))
        done
        echo "==> Temporal server is ready."

        echo "==> Creating 'default' namespace (idempotent)..."
        temporal operator namespace create \
          --namespace default \
          --retention 72h \
          --address temporal:7233 \
          2>/dev/null || echo "  'default' namespace already exists."

        echo "==> Temporal namespace setup complete."
    restart: 'no'

  temporal-ui:
    image: *temporal-ui-image
    depends_on:
      temporal-namespace-setup:
        condition: service_completed_successfully
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:8080
    ports:
      - '8088:8080'
    restart: unless-stopped

  # ── Application services ────────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      SERVICE_NAME: api
      PORT: '3000'
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_ADDR: redis:6379
      TEMPORAL_ADDR: temporal:7233
      S3_ENDPOINT: http://minio:9000
      # Pre-signed PUT URLs are sent to the browser, which can't reach the
      # internal Docker hostname. S3_PUBLIC_ENDPOINT is the address MinIO is
      # reachable at from the host machine (published on localhost:9000).
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_KEY: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EDGE_BASE: ${EDGE_BASE}
      CDN_BASE: ${CDN_BASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal-namespace-setup:
        condition: service_completed_successfully
    expose:
      - '3000'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  edge:
    build:
      context: ./transcoder
      dockerfile: Dockerfile.edge
    environment:
      SERVICE_NAME: edge
      EDGE_PORT: '8081'
      S3_ENDPOINT: http://minio:9000
      S3_KEY: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      SIGNING_SECRET: ${SIGNING_SECRET}
    depends_on:
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    expose:
      - '8081'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8081/healthz']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  worker:
    build:
      context: ./transcoder
      dockerfile: Dockerfile.worker
    environment:
      SERVICE_NAME: worker
      HEALTH_PORT: '8090'
      REDIS_ADDR: redis:6379
      TEMPORAL_ADDR: temporal:7233
      S3_ENDPOINT: http://minio:9000
      S3_KEY: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      TRANSCODE_CONCURRENCY: ${TRANSCODE_CONCURRENCY}
    depends_on:
      redis:
        condition: service_healthy
      temporal-namespace-setup:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8090/healthz']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      api:
        condition: service_started
    expose:
      - '5173'
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  proxy:
    image: nginx:1.27-alpine
    ports:
      - '8080:8080'
    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
      edge:
        condition: service_started
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:8080/healthz']
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  miniodata:
