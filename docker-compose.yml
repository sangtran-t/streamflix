name: streamflix

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${S3_BUCKET} &&
      echo 'minio bucket ready: '$${S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
    restart: "no"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      SERVICE_NAME: api
      PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_KEY: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      SIGNING_SECRET: ${SIGNING_SECRET}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      EDGE_BASE: ${EDGE_BASE}
      CDN_BASE: ${CDN_BASE}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:3000/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  edge:
    build:
      context: ./transcoder
      dockerfile: Dockerfile.edge
    environment:
      SERVICE_NAME: edge
      EDGE_PORT: "8081"
      S3_ENDPOINT: http://minio:9000
      S3_KEY: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      SIGNING_SECRET: ${SIGNING_SECRET}
    depends_on:
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    expose:
      - "8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  worker:
    build:
      context: ./transcoder
      dockerfile: Dockerfile.worker
    environment:
      SERVICE_NAME: worker
      HEALTH_PORT: "8090"
      REDIS_ADDR: redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_KEY: ${MINIO_ROOT_USER}
      S3_SECRET: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      TRANSCODE_CONCURRENCY: ${TRANSCODE_CONCURRENCY}
      JOB_TIMEOUT_SECONDS: ${JOB_TIMEOUT_SECONDS}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    depends_on:
      api:
        condition: service_started
    expose:
      - "5173"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 15s

  proxy:
    image: nginx:1.27-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./infra/proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_started
      web:
        condition: service_started
      edge:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  pgdata:
  miniodata:
